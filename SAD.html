<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praterich A.I.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
       
        body {
            background-color: rgb(255,255,0);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #app-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
        }

        .title {
            text-align: center;
            color: #000000;
            margin-bottom: 20px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Simplified Chat Box Frame */
        #chat-window {
            border: 1px solid #ccc;
            padding: 15px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #ffffff;
        }

        /* Message structures kept matching script selectors, but styled as plain boxes */
        .message {
            display: flex;
            width: 100%;
        }
        .user-message { justify-content: flex-end; }
        .ai-message { justify-content: flex-start; }

        .message-content {
            max-width: 80%;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            word-wrap: break-word;
            font-weight: normal;
            text-shadow: none;
            box-shadow: none;
        }
        .message-content::after { display: none !important; }

        .user-message .message-content { background-color: #f0f0f0; }
        .ai-message .message-content { background-color: #ffffff; }

        /* Formatting elements inside boxes */
        .message-content p { margin: 0 0 10px 0; }
        .message-content p:last-child { margin: 0; }
        .message-content pre { background: #eee; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .message-content code { background: #eee; padding: 2px 4px; border-radius: 4px; font-family: monospace; }

        .ai-message-actions { display: flex; gap: 5px; margin-top: 5px; }
        .action-button { background: #e0e0e0; border: 1px solid #ccc; cursor: pointer; padding: 4px; }

        #typing-indicator {
            padding: 10px 0;
            color: #555;
            font-size: 0.9em;
            display: none;
        }

       \
        #input-area {
            margin-top: 15px;
            width: 100%;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border: 1px solid #ccc;
            padding: 10px;
            background: #ffffff;
            border-radius: 4px;
        }

        #user-input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            outline: none;
            resize: none;
            height: 50px;
            font-family: inherit;
        }

        .input-button {
            background: #e0e0e0;
            border: 1px solid #ccc;
            width: 36px;
            height: 36px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-button:disabled {
            background: #f5f5f5;
            color: #aaa;
            cursor: default;
        }

        #char-counter {
            font-size: 0.8em;
            color: #666;
            text-align: right;
            padding-top: 5px;
        }

        #copyright {
            font-size: 0.8em;
            color: #777;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-top: 1px solid #eee;
        }

       
        #sidebar, #chat-header, #file-preview-container, #suggestion-box {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        
        <div id="sidebar">
            <img id="praterich-icon" src="" style="display:none;">
            <div id="sidebar-header"></div>
            <button id="new-chat-button"></button>
            <div id="chat-list"></div>
        </div>
        <div id="chat-header">
            <button id="menu-toggle-button"></button>
        </div>
       <h1 class="title">
         Lets talk Social Anxiety!
      </h1>
        
      
      <h3 class="title">Powered Praterich A.I</h3>
      <small>Created by Amar'e Annan</small>

        <div id="chat-container">
            <div id="chat-window"></div>
            
            <div id="typing-indicator">Praterich A.I. is typing...</div>
            
            <div id="input-area">
                <div id="file-preview-container">
                    <div class="file-preview">
                        <i id="file-icon" class="fas fa-file"></i>
                        <span id="file-name"></span>
                        <button id="remove-file-button" class="remove-file"></button>
                    </div>
                </div>
                
                <div class="input-row">
                   
                    <input type="file" id="file-upload" style="display: none;" accept="*">
                    
                    <button id="upload-button" class="input-button" title="Upload File">
                        <i class="fas fa-paperclip"></i>
                    </button>
                  
                    <button id="mic-button" class="input-button" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>
                    
                   

                    <textarea id="user-input" placeholder="Type your message here..."></textarea>
                    
                    <button id="send-button" class="input-button" title="Send" disabled="disabled">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div id="char-counter">0 / 10710 characters.</div>
            </div>
        </div>

        <div id="copyright">
            © 2026 Stenoip Company
        </div>
    </div>

    <script src="https://stenoip.github.io/praterich/ui.js"></script>
    <script src="https://stenoip.github.io/praterich/SAD-script.js"></script>

</body>
</html>
